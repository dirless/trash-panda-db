name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  binary:
    name: Binary (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Build binary
        run: |
          docker build -f Containerfile.binary -t trash-panda-binary:${{ matrix.arch }} .
          mkdir -p dist
          id=$(docker create trash-panda-binary:${{ matrix.arch }})
          docker cp "$id:/app/trashpandadb" dist/trashpandadb-${{ matrix.arch }}
          docker rm "$id"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.arch }}
          path: dist/trashpandadb-${{ matrix.arch }}

  rpm:
    name: RPM (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Build RPM
        run: |
          docker build -f Containerfile.rpm -t trash-panda-rpm:${{ matrix.arch }} .
          mkdir -p dist
          id=$(docker create trash-panda-rpm:${{ matrix.arch }})
          docker cp "$id:/rpms/." dist/
          docker rm "$id"
          find dist -name "*.rpm"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.arch }}
          path: dist/**/*.rpm

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [binary, rpm]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.rpm
            dist/trashpandadb-*
